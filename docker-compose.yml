version: '3.8'
services:
  database:
    image: mariadb:latest
    container_name: my-mariadb
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: testdb
    ports:
      - "3306:3306" # ถ้า 3306 ในเครื่องยังติด XAMPP ให้เปลี่ยนเป็น "3307:3306"
    volumes:
      - ./db_data:/var/lib/mysql
      - ./db_schema.sql:/docker-entrypoint-initdb.d/1-init.sql
      - ./db_seed.sql:/docker-entrypoint-initdb.d/2-seed.sql
  phpmyadmin:
    image: phpmyadmin
    container_name: my-pma
    restart: always
    environment:
      PMA_HOST: database
      PMA_PORT: 3306
    ports:
      - "8080:80"
    depends_on:
      - database

  backend:
    build: ./backend
    container_name: kitchen-backend
    restart: always
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - DB_HOST=database
      - DB_USER=root
      - DB_PASSWORD=root
      - DB_NAME=testdb
    depends_on:
      - database

  frontend:
    build: ./frontend
    container_name: kitchen-frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend
